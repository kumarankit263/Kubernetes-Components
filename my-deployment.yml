apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp

spec:
  replicas: 3

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp
        image: nginx

        ports:
        - containerPort: 80

        volumeMounts:
        - name: data
          mountPath: /data

        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"

      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mypvc